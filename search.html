<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch — Recherche</title>
    <script>
      try {
        const session = JSON.parse(localStorage.getItem('cinematch_session') || 'null');
        if (!session?.email) {
          window.location.replace('/login.html');
        }
      } catch (_) {
        window.location.replace('/login.html');
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="search-page">
    <div class="grain" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand">
        <a href="/" class="brand-name" style="text-decoration:none;color:inherit;">cinematch</a>
      </div>
      <nav class="topnav" aria-label="Navigation principale">
        <a href="#">idée</a>
        <a href="/" class="active">Watchlist</a>
      </nav>
      <div class="topbar-right">
        <a href="/search.html" class="search-chip">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.5 3a7.5 7.5 0 1 0 4.69 13.35l4.22 4.21 1.06-1.06-4.21-4.22A7.5 7.5 0 0 0 10.5 3Zm0 1.5A6 6 0 1 1 4.5 10.5a6 6 0 0 1 6-6Z" />
          </svg>
          <span>Rechercher</span>
        </a>
        <button type="button" class="icon-chip" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 4a5 5 0 0 0-5 5v2.9c0 .7-.2 1.4-.6 2L5 16h14l-1.4-2.1c-.4-.6-.6-1.3-.6-2V9a5 5 0 0 0-5-5Zm0 16a2.5 2.5 0 0 1-2.2-1.3h4.4A2.5 2.5 0 0 1 12 20Z"
            />
          </svg>
        </button>
        <button type="button" class="profile-chip">
          <span class="avatar-dot js-profile-avatar" aria-hidden="true"></span>
          <span class="js-profile-name">Floppyxx</span>
        </button>
      </div>
    </header>

    <section class="search-hero">
      <h1 id="random-hero-title">Envie de t'évader ?</h1>
      <p>Des milliers de références n'attendent qu'à être visionnées</p>
    </section>

    <section class="search-page-controls">
      <div class="search-input-big">
        <input id="global-search" type="search" placeholder="Rechercher un film, une série, un animé, un acteur..." />
      </div>
      <div class="search-page-filters">
        <div class="left-inline-filters">
          <button id="btn-toggle-filters" class="chip chip-filter">Filtrer</button>
          <button class="chip chip-tab active" data-tab="all">Accueil</button>
          <button class="chip chip-tab" data-tab="film">Tous les Films</button>
          <button class="chip chip-tab" data-tab="serie">Toutes les Séries</button>
          <button class="chip chip-tab" data-tab="anime">Tous les Animés</button>
        </div>
        <div class="right-inline-filters">
          <div class="sort-wrap">
            <button id="btn-sort" class="chip chip-sort" type="button" aria-expanded="false">Pertinence</button>
            <div id="sort-menu" class="sort-menu" hidden>
              <button type="button" class="sort-option" data-sort="latest">Les plus récents</button>
              <button type="button" class="sort-option active" data-sort="relevance">Pertinence</button>
              <button type="button" class="sort-option" data-sort="random">Aléatoire</button>
            </div>
          </div>
        </div>
      </div>
      <section id="filters-panel" class="filters-panel" hidden>
        <div class="active-filters-row">
          <div>
            <h3>Filtres actifs</h3>
            <div id="active-filters" class="filter-options"></div>
          </div>
          <button id="btn-reset-filters" class="chip chip-reset" type="button">Réinitialiser les filtres</button>
        </div>
        <div class="filter-group">
          <h3>Je recherche...</h3>
          <div class="filter-options">
            <button class="chip chip-option active" data-type="film">Film</button>
            <button class="chip chip-option" data-type="serie">Série</button>
            <button class="chip chip-option" data-type="anime">Animé</button>
          </div>
        </div>
        <div class="filter-group">
          <h3>Genres</h3>
          <div id="genre-filters" class="filter-options"></div>
        </div>
        <div class="filter-group">
          <h3>Sorti en...</h3>
          <div id="year-filters" class="filter-options"></div>
        </div>
      </section>
    </section>

    <section class="search-results-section" aria-label="Résultats recherche">
      <h2>Résultats trouvés</h2>
      <section id="search-results-grid" class="watchlist-grid" aria-label="Résultats recherche"></section>
    </section>

    <script type="module" src="/src/search-page.js"></script>
  </body>
</html>
